<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to Your Library</h1>
    <div class="controls">
        <div>
            <button command="show-modal" commandfor="new-book">New Book</button>
        </div>
        <dialog id="new-book">
            <button id="close-dialog" commandfor="new-book" command="close">cancel</button>
            <div class="error-message"></div>
            <form action="" id="book-form">
                <h2>please fill the book info</h2>
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" maxlength="200" required>
                </div>
                <div>
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" maxlength="100" required>
                </div>
                <div>
                    <label for="pages">Page Numbers</label>
                    <input type="number" id="pages" name="pages" min="2" max="20000" step="1">
                </div>
                <fieldset>
                    <legend>Status</legend>
                    <ul>
                        <li>
                            <input type="radio" id="finished" name="status" value="finished">
                            <label for="finished">Finished</label>
                        </li>
                        <li>
                            <input type="radio" id="in-progress" name="status" value="in progress">
                            <label for="in-progress">In Progress</label>
                        </li>
                        <li>
                            <input type="radio" id="not-started" name="status" value="not started" checked>
                            <label for="not-started">Not Started</label>
                        </li>
                    </ul>
                </fieldset>
                <button type="submit" class="add-book">Add Book</button>
            </form>
        </dialog>
        
    </div>
    <div class="library cards">
        
    </div>
</body>
</html>
