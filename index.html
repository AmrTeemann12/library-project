<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
    <link rel="icon" href="library-icon.svg" type="image/x-icon">
</head>
<body>
    <header>
        <h1>Library</h1>
    </header>
    <main>
        <div class="controls">
            <div class="open-btn-container">
                <button class="open-dialog" command="show-modal" commandfor="new-book">New Book</button>
            </div>
            <dialog id="new-book">
                <button class="close-dialog" aria-label="close dialog" title="close dialog" commandfor="new-book" command="close">
                    <svg class="icon" width="30px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9,7L11,12L9,17H11L12,14.5L13,17H15L13,12L15,7H13L12,9.5L11,7H9M5,3H19A2,2 0 0,1 21,5V19A2,2 0 0,1 19,21H5A2,2 0 0,1 3,19V5A2,2 0 0,1 5,3Z" /></svg>
                </button>
                <div class="error-container">
                    <svg width="40px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>alert-box</title><path d="M5,3H19A2,2 0 0,1 21,5V19A2,2 0 0,1 19,21H5A2,2 0 0,1 3,19V5A2,2 0 0,1 5,3M13,13V7H11V13H13M13,17V15H11V17H13Z" /></svg>
                    <p class="error-message"></p>
                </div>
                <form action="" id="book-form">
                    <h2>Please fill the book info</h2>
                    <div class="form-control">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" maxlength="200" required>
                    </div>
                    <div class="form-control">
                        <label for="author">Author</label>
                        <input type="text" id="author" name="author" maxlength="100" required>
                    </div>
                    <div class="form-control">
                        <label for="pages">Pages Number</label>
                        <input type="number" id="pages" name="pages" min="2" max="20000" step="1">
                    </div>
                    <fieldset class="radio-field">
                        <legend>Status</legend>
                        <ul>
                            <li>
                                <input type="radio" id="finished" name="status" value="finished">
                                <label for="finished">Finished</label>
                            </li>
                            <li>
                                <input type="radio" id="in-progress" name="status" value="in progress">
                                <label for="in-progress">In Progress</label>
                            </li>
                            <li>
                                <input type="radio" id="not-started" name="status" value="not started" checked>
                                <label for="not-started">Not Started</label>
                            </li>
                        </ul>
                    </fieldset>
                    <button type="submit" class="add-book">Add Book</button>
                </form>
            </dialog>
        
        </div>
        <div class="library cards">
        
        </div>
    </main>
</body>
</html>
